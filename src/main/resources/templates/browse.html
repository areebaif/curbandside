<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curb & Side - Browse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
    <style>
        .listing-popup .mapboxgl-popup-content {
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .listing-popup .mapboxgl-popup-close-button {
            font-size: 18px;
            padding: 4px 8px;
            color: #475569;
        }
        @media (max-width: 480px) {
            .listing-popup .mapboxgl-popup-content {
                max-width: 86vw;
            }
        }
    </style>
</head>
<body class="bg-white text-slate-900">

<!-- Navbar -->
<nav class="border-b border-slate-100">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="font-bold text-xl text-teal-700">Curb <span class="text-slate-900">&amp;</span> Side</a>
        <a href="/" class="text-sm font-medium text-slate-800 hover:underline">Home</a>
    </div>
</nav>

<!-- Search -->
<section class="bg-teal-50 px-6 py-10">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 text-center mb-6">
            See What's Near Me
        </h1>
        <form id="search-form" class="flex flex-col sm:flex-row gap-3">
            <input type="text" id="location-search" name="q"
                   placeholder="Search a city, neighborhood, or address (e.g. Chicago, IL)"
                   class="flex-1 border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500">
            <button type="submit"
                    class="bg-teal-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-teal-600 transition-colors">
                Search
            </button>
        </form>
        <p id="search-status" class="mt-2 text-sm text-slate-500"></p>
    </div>
</section>

<!-- Map -->
<section class="px-6 py-8">
    <div class="max-w-6xl mx-auto">
        <div id="map" class="w-full rounded-2xl border border-slate-200 shadow-sm" style="height: calc(100vh - 320px); min-height: 300px;"></div>
    </div>
</section>

<!-- Footer -->
<footer class="text-center text-sm text-slate-400 py-8 border-t border-slate-100">
    &copy; 2026 Curb &amp; Side
</footer>

<script th:inline="javascript">
    // Injected from application.properties via the controller
    mapboxgl.accessToken = /*[[${mapboxAccessToken}]]*/ 'YOUR_MAPBOX_ACCESS_TOKEN';

    const initialLat = /*[[${lat}]]*/ 41.8781;
    const initialLng = /*[[${lng}]]*/ -87.6298;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [initialLng, initialLat],
        zoom: 12
    });

    const SOURCE_ID = 'listings';
    const LAYER_ID = 'listings-points';

    // Human-readable labels for enum-style properties
    const CATEGORY_LABELS = {
        TYPE_SOFA: 'Sofa / Couch',
        TYPE_TABLE: 'Table',
        TYPE_CHAIR: 'Chair',
        TYPE_BED: 'Bed / Frame',
        TYPE_DRESSER: 'Dresser / Wardrobe',
        TYPE_DESK: 'Desk',
        TYPE_SHELVING: 'Shelving',
        TYPE_APPLIANCE: 'Appliance',
        TYPE_OTHER: 'Other'
    };

    const CONDITION_LABELS = {
        CONDITION_GREAT_BARELY_USED: 'Great — barely used',
        CONDITION_GOOD_NORMAL_WEAR: 'Good — normal wear',
        CONDITION_FAIR_VISIBLE_WEAR: 'Fair — visible wear',
        CONDITION_ROUGH_TAKE_IT_OR_LEAVE_IT: 'Rough — take it or leave it'
    };

    const STATUS_LABELS = {
        STATUS_ACTIVE: 'Available',
        STATUS_CLAIMED: 'Claimed'
    };

    function buildPopupHtml(props) {
        const title = props.title || 'Untitled item';
        const category = CATEGORY_LABELS[props.category] || props.category || '';
        const condition = CONDITION_LABELS[props.condition] || props.condition || '';
        const status = STATUS_LABELS[props.status] || props.status || '';
        const imageUrl = props.coverUrl;

        const statusBadgeClass = props.status === 'STATUS_CLAIMED'
            ? 'bg-slate-200 text-slate-600'
            : 'bg-teal-100 text-teal-700';

        return `
            <div style="width: min(280px, 80vw); font-family: inherit;">
                ${imageUrl ? `
                    <div style="width:100%; height:140px; overflow:hidden; border-radius:12px 12px 0 0; background:#f1f5f9;">
                        <img src="${imageUrl}" alt="${title}" style="width:100%; height:100%; object-fit:cover; display:block;">
                    </div>
                ` : ''}
                <div style="padding:12px 14px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:6px;">
                        <h3 style="font-weight:700; font-size:15px; line-height:1.3; margin:0; color:#0f172a;">${title}</h3>
                        <span class="${statusBadgeClass}" style="font-size:11px; font-weight:600; padding:2px 8px; border-radius:9999px; white-space:nowrap;">${status}</span>
                    </div>
                    ${category ? `<p style="font-size:13px; color:#475569; margin:2px 0;">${category}</p>` : ''}
                    ${condition ? `<p style="font-size:13px; color:#475569; margin:2px 0;">${condition}</p>` : ''}
                </div>
            </div>
        `;
    }

    map.on('load', () => {
        map.addSource(SOURCE_ID, {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] }
        });

        map.addLayer({
            id: LAYER_ID,
            type: 'circle',
            source: SOURCE_ID,
            paint: {
                'circle-radius': 8,
                'circle-color': [
                    'case',
                    ['==', ['get', 'status'], 'STATUS_CLAIMED'], '#94a3b8',
                    '#14b8a6'
                ],
                'circle-stroke-width': 2,
                'circle-stroke-color': '#ffffff'
            }
        });

        // Click a point to show a mobile-friendly popup card with listing details
        map.on('click', LAYER_ID, (e) => {
            const feature = e.features[0];
            const props = feature.properties;
            const coords = feature.geometry.coordinates.slice();

            new mapboxgl.Popup({ maxWidth: 'none', className: 'listing-popup' })
                .setLngLat(coords)
                .setHTML(buildPopupHtml(props))
                .addTo(map);
        });

        // Tap-friendly cursor feedback (desktop hover, harmless on mobile)
        map.on('mouseenter', LAYER_ID, () => {
            map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', LAYER_ID, () => {
            map.getCanvas().style.cursor = '';
        });

        // Load nearby listings as soon as the map is ready
        loadNearbyListings(initialLat, initialLng);
    });

    async function loadNearbyListings(lat, lng) {
        const statusEl = document.getElementById('search-status');

        try {
            const res = await fetch(`/api/listings/nearby?lat=${lat}&lng=${lng}`);
            if (!res.ok) {
                throw new Error('Failed to load nearby listings');
            }
            const geojson = await res.json();

            const source = map.getSource(SOURCE_ID);
            if (source) {
                source.setData(geojson);
            }

            const count = geojson.features ? geojson.features.length : 0;
            statusEl.textContent = count > 0
                ? `Showing ${count} item(s) near you`
                : 'No items found near you yet.';
        } catch (err) {
            console.error(err);
            statusEl.textContent = 'Unable to load nearby items right now.';
        }
    }

    async function search(query) {
        const statusEl = document.getElementById('search-status');
        statusEl.textContent = 'Searching...';

        try {
            // Single endpoint: returns a GeoJSON FeatureCollection from MySQL
            const res = await fetch(`/api/listings/search?q=${encodeURIComponent(query)}`);
            if (!res.ok) {
                throw new Error('Search request failed');
            }
            const geojson = await res.json();

            // Update the map source with the new results
            const source = map.getSource(SOURCE_ID);
            if (source) {
                source.setData(geojson);
            }

            const count = geojson.features ? geojson.features.length : 0;
            statusEl.textContent = `Found ${count} item(s) for "${query}"`;

            // If there are results, fly to the first one; otherwise leave the map as is
            if (count > 0) {
                const [lng, lat] = geojson.features[0].geometry.coordinates;
                map.flyTo({ center: [lng, lat], zoom: 12 });
            } else {
                statusEl.textContent = `No items found for "${query}"`;
            }
        } catch (err) {
            console.error(err);
            statusEl.textContent = 'Something went wrong. Please try again.';
        }
    }

    document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const query = document.getElementById('location-search').value.trim();
        if (query) search(query);
    });
</script>

</body>
</html>
